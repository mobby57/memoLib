# Configuration Conda pour memoLib
# Environnement Python pour services backend IA/ML
name: memoLib

channels:
  - conda-forge
  - defaults

dependencies:
  # Python version
  - python=3.11

  # Web Frameworks
  - fastapi>=0.115.0
  - uvicorn>=0.30.0
  - flask>=3.1.0
  - flask-cors>=5.0.0
  - gunicorn>=22.0.0

  # Data Science & ML
  - numpy>=1.26.4
  - pandas>=2.2.3
  - scikit-learn>=1.5.2

  # Utilities
  - python-dateutil>=2.9.0.post0
  - cryptography>=44.0.0
  - httpx>=0.28.1
  - python-multipart>=0.0.20
  - pydantic>=2.10.0
  - pydantic-settings>=2.7.0
  - python-dotenv>=1.0.1
  - email-validator>=2.2.0

  # PDF Generation
  - reportlab>=4.2.5
  - pypdf2>=3.0.1

  # Email
  - google-auth>=2.37.0
  - google-auth-oauthlib>=1.2.1
  - google-auth-httplib2>=0.2.0
  - google-api-python-client>=2.154.0

  # NLP & Text Processing (pour recherche sémantique)
  - spacy>=3.8.2
  - beautifulsoup4>=4.12.3
  - lxml>=5.3.0

  # Database
  - sqlalchemy>=2.0.36
  - psycopg2>=2.9.10  # PostgreSQL
  - redis-py>=5.2.0  # Cache (optionnel)

  # Testing
  - pytest>=8.3.0
  - pytest-asyncio>=0.24.0
  - pytest-cov>=6.0.0
  - httpx>=0.28.1  # Pour tests API

  # Development Tools
  - black>=24.10.0  # Formatage code
  - flake8>=7.1.1   # Linting
  - mypy>=1.14.0    # Type checking
  - ipython>=8.31.0
  - jupyter>=1.1.1

  # Monitoring & Logging
  - prometheus-client>=0.21.0
  - sentry-sdk>=2.19.0
  - python-json-logger>=2.0.7

  # pip dependencies (si pas disponibles sur conda)
  - pip
  - pip:
    # IA Locale (Ollama client)
    - ollama>=0.4.7
    - openai>=1.58.0
    
    # FastAPI extensions
    - python-jose[cryptography]>=3.4.0
    - passlib[bcrypt]>=1.7.4
    - flask-jwt-extended>=4.7.1
    
    # Email advanced
    - html2text>=2024.2.26
    
    # PDF advanced
    - weasyprint>=63.0
    
    # Monitoring
    - prometheus-fastapi-instrumentator>=7.0.0
