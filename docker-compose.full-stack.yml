# =============================================================================
# MemoLib - Docker Compose Production Complete
# =============================================================================
# Tous les services necessaires pour le projet MemoLib
#
# Usage:
#   docker compose -f docker-compose.full-stack.yml up -d
#   docker compose -f docker-compose.full-stack.yml logs -f
#   docker compose -f docker-compose.full-stack.yml down
#
# Premier lancement:
#   cp .env.docker.example .env.docker
#   # Editer .env.docker avec vos valeurs
#   docker compose -f docker-compose.full-stack.yml --env-file .env.docker up -d
# =============================================================================

services:

  # ===========================================================================
  # 1. MemoLib API - ASP.NET Core 9.0 (Backend principal)
  # ===========================================================================
  memolib-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: memolib-api
    restart: unless-stopped
    ports:
      - "5078:5078"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5078
      - UsePostgreSQL=true
      - ConnectionStrings__Default=Host=postgres;Port=5432;Database=memolib;Username=${POSTGRES_USER:-memolib};Password=${POSTGRES_PASSWORD:-memolib_secure_2025};Include Error Detail=true
      - JwtSettings__SecretKey=${JWT_SECRET_KEY}
      - JwtSettings__Issuer=MemoLib.Api
      - JwtSettings__Audience=MemoLib.Client
      - JwtSettings__ExpirationMinutes=1440
      - JwtSettings__RefreshExpirationDays=7
      - EmailMonitor__Enabled=${EMAIL_MONITOR_ENABLED:-false}
      - EmailMonitor__ImapHost=imap.gmail.com
      - EmailMonitor__ImapPort=993
      - EmailMonitor__Username=${EMAIL_USERNAME:-}
      - EmailMonitor__Password=${EMAIL_PASSWORD:-}
      - EmailMonitor__IntervalSeconds=60
      - EmailMonitor__ConnectTimeoutSeconds=10
      - EmailMonitor__MaxRetries=3
      - EmailMonitor__SmtpHost=smtp.gmail.com
      - EmailMonitor__SmtpPort=587
      - Vault__MasterKey=${VAULT_MASTER_KEY:-}
      - DisableHttpsRedirection=true
      - Cors__AllowedOrigins__0=http://localhost:3000
      - Cors__AllowedOrigins__1=http://localhost:5078
      - Cors__AllowedOrigins__2=https://${DOMAIN:-memolib.local}
      - Serilog__WriteTo__1__Name=Seq
      - Serilog__WriteTo__1__Args__serverUrl=http://seq:5341
    volumes:
      - api-uploads:/app/uploads
      - api-logs:/app/logs
      - api-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5078/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - memolib-net

  # ===========================================================================
  # 2. PostgreSQL 16 - Base de donnees principale
  # ===========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: memolib-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-memolib}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-memolib_secure_2025}
      POSTGRES_DB: memolib
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-memolib} -d memolib"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - memolib-net

  # ===========================================================================
  # 3. Redis 7 - Cache distribue + SignalR backplane + Rate limiting
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: memolib-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:-memolib_redis_2025}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-memolib_redis_2025}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - memolib-net

  # ===========================================================================
  # 4. Nginx - Reverse proxy + SSL + Static files
  # ===========================================================================
  nginx:
    image: nginx:1.27-alpine
    container_name: memolib-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - nginx-cache:/var/cache/nginx
    depends_on:
      memolib-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - memolib-net

  # ===========================================================================
  # 5. Seq - Logs centralises (Serilog sink)
  # ===========================================================================
  seq:
    image: datalust/seq:latest
    container_name: memolib-seq
    restart: unless-stopped
    ports:
      - "5341:5341"
      - "8081:80"
    environment:
      ACCEPT_EULA: "Y"
      SEQ_API_KEY: ${SEQ_API_KEY:-}
    volumes:
      - seq-data:/data
    networks:
      - memolib-net

  # ===========================================================================
  # 6. Prometheus - Metriques et monitoring
  # ===========================================================================
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: memolib-prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - memolib-net

  # ===========================================================================
  # 7. Grafana - Dashboards et alertes
  # ===========================================================================
  grafana:
    image: grafana/grafana:10.4.0
    container_name: memolib-grafana
    restart: unless-stopped
    ports:
      - "3333:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-memolib_grafana_2025}
      GF_INSTALL_PLUGINS: grafana-clock-panel
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - memolib-net

  # ===========================================================================
  # 8. pgAdmin 4 - Administration PostgreSQL
  # ===========================================================================
  pgadmin:
    image: dpage/pgadmin4:8.4
    container_name: memolib-pgadmin
    restart: unless-stopped
    ports:
      - "8082:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@memolib.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-memolib_pgadmin_2025}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - memolib-net

  # ===========================================================================
  # 9. pg-backup - Backup automatique PostgreSQL (cron quotidien)
  # ===========================================================================
  pg-backup:
    image: prodrigestivill/postgres-backup-local:16
    container_name: memolib-pg-backup
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: memolib
      POSTGRES_USER: ${POSTGRES_USER:-memolib}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-memolib_secure_2025}
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
      HEALTHCHECK_PORT: 8080
    volumes:
      - pg-backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - memolib-net

# =============================================================================
# Volumes persistants
# =============================================================================
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  api-uploads:
    driver: local
  api-logs:
    driver: local
  api-data:
    driver: local
  seq-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  pgadmin-data:
    driver: local
  pg-backups:
    driver: local
  nginx-cache:
    driver: local

# =============================================================================
# Reseau interne
# =============================================================================
networks:
  memolib-net:
    driver: bridge
    name: memolib-net
