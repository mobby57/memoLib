<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MemoLib - Widgets & Charts Demo</title>
    <link rel="stylesheet" href="css/demo-modern.css">
    <link rel="stylesheet" href="css/widgets.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        .demo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .demo-section {
            margin-bottom: 40px;
        }
        .demo-section h2 {
            margin-bottom: 20px;
            color: #1f2937;
            font-size: 24px;
        }
        .chart-wrapper {
            height: 300px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎨 Widgets & Charts Demo</h1>
            <p>Composants réutilisables pour dashboard moderne</p>
        </div>

        <div class="quickbar">
            <button class="btn" onclick="window.location.href='demo.html'">🔙 Retour</button>
            <button class="btn btn-success" onclick="refreshAllWidgets()">🔄 Actualiser</button>
            <button class="btn" onclick="exportDemo()">📥 Exporter</button>
        </div>

        <!-- Stat Widgets -->
        <div class="demo-section">
            <h2>📊 Stat Widgets</h2>
            <div class="demo-grid">
                <div id="stat-widget-1"></div>
                <div id="stat-widget-2"></div>
                <div id="stat-widget-3"></div>
                <div id="stat-widget-4"></div>
            </div>
        </div>

        <!-- Progress Widgets -->
        <div class="demo-section">
            <h2>📈 Progress Widgets</h2>
            <div class="demo-grid">
                <div id="progress-widget-1"></div>
                <div id="progress-widget-2"></div>
                <div id="progress-widget-3"></div>
            </div>
        </div>

        <!-- Charts -->
        <div class="demo-section">
            <h2>📉 Charts</h2>
            <div class="demo-grid">
                <div class="chart-container">
                    <div class="chart-header">
                        <h3 class="chart-title">Emails par jour</h3>
                    </div>
                    <div class="chart-wrapper">
                        <canvas id="line-chart"></canvas>
                    </div>
                </div>

                <div class="chart-container">
                    <div class="chart-header">
                        <h3 class="chart-title">Répartition dossiers</h3>
                    </div>
                    <div class="chart-wrapper">
                        <canvas id="doughnut-chart"></canvas>
                    </div>
                </div>

                <div class="chart-container">
                    <div class="chart-header">
                        <h3 class="chart-title">Performance hebdomadaire</h3>
                    </div>
                    <div class="chart-wrapper">
                        <canvas id="bar-chart"></canvas>
                    </div>
                </div>

                <div class="chart-container">
                    <div class="chart-header">
                        <h3 class="chart-title">Évaluation équipe</h3>
                    </div>
                    <div class="chart-wrapper">
                        <canvas id="radar-chart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- Activity Widget -->
        <div class="demo-section">
            <h2>⚡ Activity Widget</h2>
            <div class="demo-grid">
                <div id="activity-widget"></div>
                <div id="compact-dashboard"></div>
            </div>
        </div>

        <!-- Sparkline Widgets -->
        <div class="demo-section">
            <h2>✨ Sparkline Widgets</h2>
            <div class="demo-grid">
                <div id="sparkline-1"></div>
                <div id="sparkline-2"></div>
                <div id="sparkline-3"></div>
            </div>
        </div>
    </div>

    <script src="js/components/charts.js"></script>
    <script src="js/components/widgets.js"></script>
    <script src="js/demo-enhancements.js"></script>
    <script>
        // Initialisation des Stat Widgets
        widgetManager.createStatWidget('stat-widget-1', {
            icon: '📧',
            value: 1247,
            label: 'Emails reçus',
            color: '#667eea',
            trend: 12.5
        });

        widgetManager.createStatWidget('stat-widget-2', {
            icon: '📁',
            value: 89,
            label: 'Dossiers actifs',
            color: '#10b981',
            trend: 8.3
        });

        widgetManager.createStatWidget('stat-widget-3', {
            icon: '⚠️',
            value: 23,
            label: 'Anomalies',
            color: '#f59e0b',
            trend: -15.2
        });

        widgetManager.createStatWidget('stat-widget-4', {
            icon: '👥',
            value: 456,
            label: 'Clients',
            color: '#3b82f6',
            trend: 5.7
        });

        // Progress Widgets
        widgetManager.createProgressWidget('progress-widget-1', {
            label: 'Dossiers traités',
            percentage: 75,
            color: '#667eea',
            subtitle: '45 sur 60 dossiers'
        });

        widgetManager.createProgressWidget('progress-widget-2', {
            label: 'Objectif mensuel',
            percentage: 92,
            color: '#10b981',
            subtitle: '92% de l\'objectif atteint'
        });

        widgetManager.createProgressWidget('progress-widget-3', {
            label: 'Satisfaction client',
            percentage: 88,
            color: '#f59e0b',
            subtitle: '4.4/5 étoiles'
        });

        // Line Chart
        chartManager.createLineChart('line-chart', {
            labels: ['Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam', 'Dim'],
            values: [12, 19, 15, 25, 22, 18, 24],
            label: 'Emails'
        }, {
            color: '#667eea',
            fill: true
        });

        // Doughnut Chart
        chartManager.createDoughnutChart('doughnut-chart', {
            labels: ['Ouverts', 'En cours', 'Clôturés', 'Archivés'],
            values: [15, 30, 28, 12]
        }, {
            colors: ['#f59e0b', '#667eea', '#10b981', '#6b7280']
        });

        // Bar Chart
        chartManager.createBarChart('bar-chart', {
            labels: ['Lun', 'Mar', 'Mer', 'Jeu', 'Ven'],
            values: [5, 8, 6, 9, 7],
            label: 'Dossiers traités'
        }, {
            color: '#667eea'
        });

        // Radar Chart
        chartManager.createRadarChart('radar-chart', {
            labels: ['Réactivité', 'Qualité', 'Communication', 'Expertise', 'Efficacité'],
            values: [85, 92, 78, 95, 88],
            label: 'Performance'
        }, {
            color: '#667eea',
            max: 100
        });

        // Activity Widget
        widgetManager.createActivityWidget('activity-widget', {
            title: 'Activités récentes',
            showViewAll: true,
            activities: [
                {
                    icon: '📧',
                    color: '#667eea',
                    title: 'Nouvel email reçu',
                    description: 'Marie Dubois - Divorce urgent',
                    time: 'Il y a 5 minutes'
                },
                {
                    icon: '📁',
                    color: '#10b981',
                    title: 'Dossier créé',
                    description: 'Litige commercial - Jean Martin',
                    time: 'Il y a 2 heures'
                },
                {
                    icon: '⚠️',
                    color: '#f59e0b',
                    title: 'Anomalie détectée',
                    description: 'Email sans expéditeur',
                    time: 'Il y a 4 heures'
                },
                {
                    icon: '✅',
                    color: '#10b981',
                    title: 'Dossier clôturé',
                    description: 'Succession - Sophie Lefebvre',
                    time: 'Il y a 1 jour'
                }
            ]
        });

        // Compact Dashboard
        widgetManager.createCompactDashboard('compact-dashboard', {
            title: 'Vue d\'ensemble',
            metrics: [
                { icon: '📧', value: 127, label: 'Emails', color: '#667eea' },
                { icon: '📁', value: 45, label: 'Dossiers', color: '#10b981' },
                { icon: '👥', value: 89, label: 'Clients', color: '#3b82f6' },
                { icon: '⚠️', value: 8, label: 'Alertes', color: '#f59e0b' }
            ]
        });

        // Sparkline Widgets
        widgetManager.createSparklineWidget('sparkline-1', {
            value: 1247,
            label: 'Emails (7 jours)',
            data: [120, 135, 142, 128, 155, 148, 162],
            color: '#667eea'
        });

        widgetManager.createSparklineWidget('sparkline-2', {
            value: 89,
            label: 'Dossiers (7 jours)',
            data: [82, 85, 83, 87, 86, 88, 89],
            color: '#10b981'
        });

        widgetManager.createSparklineWidget('sparkline-3', {
            value: 456,
            label: 'Clients (7 jours)',
            data: [445, 448, 450, 452, 453, 455, 456],
            color: '#3b82f6'
        });

        // Fonctions utilitaires
        function refreshAllWidgets() {
            window.toast?.show('Actualisation des widgets...', 'info');
            
            // Simuler mise à jour
            setTimeout(() => {
                widgetManager.updateWidget('stat-widget-1', { value: Math.floor(Math.random() * 2000) });
                widgetManager.updateWidget('progress-widget-1', { percentage: Math.floor(Math.random() * 100) });
                
                chartManager.updateChart('line-chart', {
                    values: Array.from({length: 7}, () => Math.floor(Math.random() * 30))
                });

                window.toast?.show('Widgets actualisés !', 'success');
            }, 1000);
        }

        function exportDemo() {
            window.toast?.show('Export en cours...', 'info');
            setTimeout(() => {
                window.toast?.show('Dashboard exporté avec succès !', 'success');
            }, 1500);
        }

        // Auto-refresh demo
        widgetManager.enableAutoRefresh('stat-widget-1', (id) => {
            const newValue = Math.floor(Math.random() * 2000);
            widgetManager.updateWidget(id, { value: newValue });
        }, 10000);

        console.log('✅ Widgets & Charts Demo initialisé');
    </script>
</body>
</html>
