<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MemoLib - Hors ligne</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        h1 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 2rem;
        }
        p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 25px;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📡</div>
        <h1>Mode Hors Ligne</h1>
        <p>Vous êtes actuellement hors ligne. MemoLib nécessite une connexion Internet pour fonctionner.</p>
        <p>Vos données sont sauvegardées localement et seront synchronisées dès que la connexion sera rétablie.</p>
        <button class="btn" onclick="window.location.reload()">Réessayer</button>
        <div class="status" id="status">
            Vérification de la connexion...
        </div>
    </div>

    <script>
        function checkConnection() {
            const status = document.getElementById('status');
            if (navigator.onLine) {
                status.innerHTML = '✅ Connexion détectée ! Rechargement...';
                status.style.background = '#d1fae5';
                status.style.color = '#065f46';
                setTimeout(() => window.location.reload(), 1000);
            } else {
                status.innerHTML = '❌ Toujours hors ligne';
                status.style.background = '#fee2e2';
                status.style.color = '#991b1b';
            }
        }

        window.addEventListener('online', () => {
            checkConnection();
        });

        setInterval(checkConnection, 3000);
        checkConnection();
    </script>
</body>
</html>
