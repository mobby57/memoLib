version: '3.8'

services:
  memolib-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: memolib-api
    ports:
      - "5078:5078"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__Default=Data Source=/app/data/memolib.db
      - JwtSettings__SecretKey=${JWT_SECRET_KEY:?JWT_SECRET_KEY must be set in .env}
      - JwtSettings__Issuer=memolib
      - JwtSettings__Audience=memolib-users
    volumes:
      - memolib-data:/app/data
      - memolib-logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5078/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - memolib-network

volumes:
  memolib-data:
    driver: local
  memolib-logs:
    driver: local

networks:
  memolib-network:
    driver: bridge
