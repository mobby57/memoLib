name: Email Flow Tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - src/app/api/emails/incoming/route.ts
      - src/__tests__/api/emails/**
      - src/__tests__/api/lawyer/workspace-emails-route.test.ts
      - package.json
      - prisma/schema.prisma
  push:
    branches:
      - main
    paths:
      - src/app/api/emails/incoming/route.ts
      - src/__tests__/api/emails/**
      - src/__tests__/api/lawyer/workspace-emails-route.test.ts
      - package.json
      - prisma/schema.prisma

jobs:
  email-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: memolib_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/memolib_test?schema=public
      NODE_ENV: test
      NEXTAUTH_SECRET: test-secret
      NEXTAUTH_URL: http://localhost:3000
      INCOMING_EMAIL_WEBHOOK_SECRET: test-secret

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Prisma db push
        run: npx prisma db push --accept-data-loss

      - name: Run email demo tests
        run: npm run email:test:demo

      - name: Run email integration db tests
        run: npm run email:test:integration-db
